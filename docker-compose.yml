services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: renting
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d renting"]
      interval: 5s
      timeout: 5s
      retries: 10

  loki:
    image: grafana/loki:latest
    ports:
      - "3245:3100"
    command: -config.file=/etc/loki/local-config.yaml

  renting-api:
    build:
      context: .
      dockerfile: src/GtMotive.Estimate.Microservice.Host/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__Default: "Host=postgres;Database=renting;Username=app;Password=secret"
      Loki__Url: "http://loki:3100"
      ApiKey__Value: "x-api-key"
    depends_on:
      postgres:
        condition: service_healthy
      loki:
        condition: service_started
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - renting-api

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3244:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
volumes:
  postgres_data:
  grafana_data:
